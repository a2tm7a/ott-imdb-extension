<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMDB Ratings for OTT</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">

    <!-- Header -->
    <div class="popup__header">
      <div class="popup__logo">
        <div class="popup__logo-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 1.5L12.39 7.26L18.66 7.64L14 11.69L15.56 17.85L10 14.5L4.44 17.85L6 11.69L1.34 7.64L7.61 7.26L10 1.5Z" fill="#f5c518"/>
          </svg>
        </div>
        <div class="popup__logo-text">
          <span class="popup__brand">IMDb</span><span class="popup__brand-ott"> for OTT</span>
        </div>
      </div>
      <span class="popup__version">v1.0</span>
    </div>

    <!-- API Key Section -->
    <div class="popup__section" id="api-section">
      <label class="popup__label" for="api-key-input">
        OMDb API Key
        <a href="https://www.omdbapi.com/apikey.aspx" target="_blank" class="popup__link" title="Get a free key">Get free key ↗</a>
      </label>
      <div class="popup__input-row">
        <input
          id="api-key-input"
          type="password"
          class="popup__input"
          placeholder="e.g. a1b2c3d4"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="toggle-key-visibility" class="popup__icon-btn" title="Show/hide key">
          <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div id="api-status" class="popup__api-status"></div>
    </div>

    <div class="popup__divider"></div>

    <!-- Platform Toggles -->
    <div class="popup__section">
      <p class="popup__label">Platforms</p>

      <div class="popup__platform" id="platform-netflix">
        <div class="popup__platform-info">
          <span class="popup__platform-dot" style="background:#e50914"></span>
          <span class="popup__platform-name">Netflix</span>
          <span class="popup__platform-badge popup__platform-badge--live">Live</span>
        </div>
        <label class="popup__toggle">
          <input type="checkbox" id="toggle-netflix" checked />
          <span class="popup__toggle-slider"></span>
        </label>
      </div>

      <div class="popup__platform popup__platform--coming-soon" id="platform-prime">
        <div class="popup__platform-info">
          <span class="popup__platform-dot" style="background:#00a8e0"></span>
          <span class="popup__platform-name">Prime Video</span>
          <span class="popup__platform-badge">Soon</span>
        </div>
        <label class="popup__toggle popup__toggle--disabled">
          <input type="checkbox" id="toggle-prime" disabled />
          <span class="popup__toggle-slider"></span>
        </label>
      </div>

      <div class="popup__platform" id="platform-hotstar">
        <div class="popup__platform-info">
          <span class="popup__platform-dot" style="background:#1f80e0"></span>
          <span class="popup__platform-name">Hotstar</span>
          <span class="popup__platform-badge popup__platform-badge--live">Live</span>
        </div>
        <label class="popup__toggle">
          <input type="checkbox" id="toggle-hotstar" checked />
          <span class="popup__toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="popup__divider"></div>

    <!-- Save Button -->
    <div class="popup__section popup__section--actions">
      <button id="save-btn" class="popup__save-btn">Save Settings</button>
      <div id="save-status" class="popup__save-status"></div>
    </div>

    <!-- Rating legend -->
    <div class="popup__legend">
      <span class="popup__legend-item popup__legend-item--great">★ ≥ 8.0 Great</span>
      <span class="popup__legend-item popup__legend-item--good">★ 6.5–8 Good</span>
      <span class="popup__legend-item popup__legend-item--poor">★ &lt; 6.5 Meh</span>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
